<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caricamento in corso...</title>
    <!-- Redirect automatico via meta refresh (funziona anche senza JavaScript) -->
    <meta http-equiv="refresh" content="3;url=https://deploy-status-badge-generator.vercel.app/">
    <link rel="canonical" href="https://deploy-status-badge-generator.vercel.app/">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="loader-wrapper">
            <div class="spinner">
                <div class="double-bounce1"></div>
                <div class="double-bounce2"></div>
            </div>
        </div>
        <h1>Caricamento In Corso...</h1>
        <p class="subtitle">Stai per essere indirizzato automaticamente</p>
        <p class="countdown">Verrai reindirizzato tra <span id="timer">3</span> secondi</p>
        <p class="fallback">
            Se il reindirizzamento non avviene automaticamente,
            <a href="https://deploy-status-badge-generator.vercel.app/">clicca qui</a>.
        </p>
    </div>

    <a href="https://github.com/PiBOH" target="_blank" rel="noopener noreferrer" class="author">
        Autore: PiBOH
    </a>
    <div class="version">v1.0.0c</div>

    <script src="script.js"></script>
</body>
</html>
